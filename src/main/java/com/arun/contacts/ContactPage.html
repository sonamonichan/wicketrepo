<!DOCTYPE html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <title>Address Book</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">


    <link href="font/css/font-awesome.min.css" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="css/animatecss/animate.min.css"/>
    <!-- SLIDENAV -->
    <link rel="stylesheet" type="text/css" href="animatecss/slidernav.css"/>
    <!-- FONTS -->
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700' rel='stylesheet' type='text/css'>
    <!-- Contact page styles -->
    <link rel="stylesheet" type="text/css" href="css/contacts.css"/>
</head>
<body>

<!-- HEADER -->

<!--/HEADER -->

<!-- PAGE -->
<section id="page">
    <!-- SIDEBAR -->
    <!-- /SIDEBAR -->
    <div class="container">
        <div class="row">

            <div class="col-md-12">
                <!-- BOX -->
                <div align="right">
                    <a href="" wicket:id="signOutLink"><input type="image" src="signout.png" name="add" class="btImg"
                                                              wicket:id="signoutImg"/></a></div>
                <div class="box border green">
                    <div class="box-title">
                        <h4><i class="fa fa-book"></i>Address Book</h4>

                    </div>
                    <div class="box-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div id="address-book">


                                    <form wicket:id="addressNameList" class="slider-content">
                                        <input type="image" src="images/add.png" name="add" class="btImg"
                                               wicket:id="addImg"/>
                                        <ul>
                                            <li wicket:id="namelistItems"></li>
                                        </ul>
                                    </form>

                                </div>
                            </div>
                            <div class="col-md-8">

                                <form wicket:id="contactDetails" class="panel panel-default">
                                    <div class="panel-heading">
                                        <h2 class="panel-title"><span wicket:id="contactNameHeading">John Doe</span>
                                        </h2>
                                    </div>
                                    <div class="panel-body">
                                        <div id="card" class="row">
                                            <div class="col-md-6">
                                                <table class="table table-hover">
                                                    <tbody>
                                                    <tr>
                                                        <td><i class="fa fa-font"></i> Name</td>
                                                        <td id="card-name"><input wicket:id="contactName"
                                                                                  class="contact" type="text"
                                                                                  name="fname"></td>
                                                    </tr>
                                                    <tr>
                                                        <td><i class="fa fa-home"></i> Address</td>
                                                        <td><textarea wicket:id="contactAddress" class="contact"
                                                                      name="Text1" rows="3"></textarea>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td><i class="fa fa-phone"></i> Phone</td>
                                                        <td><input wicket:id="contactPhone" class="contact" type="text"
                                                                   name="phone"></td>
                                                    </tr>
                                                    <tr>
                                                        <td><i class="fa fa-envelope"></i> Email</td>
                                                        <td><input wicket:id="contactEmail" class="contact" type="text"
                                                                   name="email"></td>
                                                    </tr>

                                                    </tbody>
                                                </table>
                                                <label wicket:id="contactError" class="labelError"><i
                                                        class="fa fa-exclamation-triangle" aria-hidden="true"></i>Error</label>
                                            </div>
                                        </div>
                                        <div align="right">

                                            <input type="image" src="images/edit.png" name="edit" class="btImg"
                                                   wicket:id="editImg"/>
                                            <input type="image" src="images/delete.png" name="delete" class="btImg"
                                                   wicket:id="deleteImg"/>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- /BOX -->
            </div>
        </div>
    </div>
</section>

<!--/PAGE -->
<!-- JAVASCRIPTS -->
<!-- Placed at the end of the document so the pages load faster -->

<script src="js/jquery/jquery-2.0.3.min.js"></script>

<script src="js/bootstrap.min.js"></script>

<script type="text/javascript" src="js/slidernav/slidernav.js"></script>
